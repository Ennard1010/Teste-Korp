services:
  postgres:
    image: postgres:16-alpine
    container_name: korp_postgres
    environment:
      POSTGRES_USER: korp
      POSTGRES_PASSWORD: korp123
      POSTGRES_DB: korp_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U korp -d korp_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  estoque-service:
    build: ./estoque-service
    container_name: korp_estoque
    ports:
      - "8081:8081"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: korp
      DB_PASSWORD: korp123
      DB_NAME: korp_db
      PORT: 8081
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  faturamento-service:
    build: ./faturamento-service
    container_name: korp_faturamento
    ports:
      - "8082:8082"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: korp
      DB_PASSWORD: korp123
      DB_NAME: korp_db
      ESTOQUE_SERVICE_URL: http://estoque-service:8081
      PORT: 8082
    depends_on:
      postgres:
        condition: service_healthy
      estoque-service:
        condition: service_started
    restart: on-failure

  frontend:
    build: ./frontend/korp_teste_giovannisantos
    container_name: korp_frontend
    ports:
      - "4200:80"
    depends_on:
      - estoque-service
      - faturamento-service

volumes:
  pgdata: